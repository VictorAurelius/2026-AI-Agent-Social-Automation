<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    display: flex; flex-direction: column;
    padding: 80px;
    font-family: 'Noto Sans', 'Segoe UI', sans-serif;
  }
  .header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 40px;
  }
  .number {
    background: #2563EB; color: white;
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800;
    flex-shrink: 0;
  }
  h2 {
    font-size: 44px; color: #1E293B;
    font-weight: 800; line-height: 1.2;
  }
  .subheading {
    font-size: 28px; color: #2563EB;
    margin-bottom: 30px; font-weight: 600;
  }
  .body {
    font-size: 26px; color: #475569;
    line-height: 1.7; flex: 1;
  }
  .highlight {
    margin-top: auto;
    padding: 28px;
    background: #F0F9FF;
    border-radius: 16px;
    border-left: 5px solid #2563EB;
  }
  .highlight p {
    font-size: 24px; color: #1E293B;
    font-weight: 700;
  }
  .page-indicator {
    position: absolute; bottom: 40px; right: 40px;
    font-size: 16px; color: #CBD5E1;
  }
</style>
</head>
<body>
  <div class="header">
    <span class="number">{{NUMBER}}</span>
    <h2>{{HEADING}}</h2>
  </div>
  <p class="subheading">{{SUBHEADING}}</p>
  <p class="body">{{BODY}}</p>
  <div class="highlight">
    <p>{{HIGHLIGHT}}</p>
  </div>
  <span class="page-indicator">{{NUMBER}}/{{TOTAL}}</span>
</body>
</html>
