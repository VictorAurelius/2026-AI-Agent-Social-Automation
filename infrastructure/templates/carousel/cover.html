<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px;
    font-family: 'Noto Sans', 'Segoe UI', sans-serif;
    color: white;
  }
  .accent-line {
    width: 4px; height: 60px;
    background: #2563EB;
    border-radius: 2px;
    margin-bottom: 40px;
  }
  h1 {
    font-size: 52px; text-align: center;
    line-height: 1.3; font-weight: 800;
    max-width: 900px;
  }
  .hook {
    font-size: 24px; color: #94A3B8;
    margin-top: 30px; text-align: center;
    max-width: 800px; line-height: 1.5;
  }
  .swipe {
    margin-top: 60px;
    display: flex; align-items: center; gap: 12px;
  }
  .swipe span {
    font-size: 20px; color: #2563EB;
    animation: pulse 2s infinite;
  }
  .author {
    position: absolute; bottom: 40px;
    font-size: 16px; color: #64748B;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <h1>{{TITLE}}</h1>
  <p class="hook">{{HOOK}}</p>
  <div class="swipe"><span>Swipe &rarr;</span></div>
  <p class="author">@VictorAurelius</p>
</body>
</html>
