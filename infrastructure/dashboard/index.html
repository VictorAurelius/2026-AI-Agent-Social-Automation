<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="dashboard()" x-init="init()">
    <!-- Header -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🤖</span>
                <h1 class="text-xl font-bold text-gray-800">AI Agent Dashboard</h1>
            </div>
            <div class="flex items-center gap-4 text-sm text-gray-500">
                <span x-text="'Last updated: ' + lastUpdated"></span>
                <button @click="refresh()" class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">
                    Refresh
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 mb-6">
            <template x-for="stat in stats" :key="stat.label">
                <div class="bg-white rounded-lg shadow-sm p-4 border">
                    <p class="text-2xl font-bold" :class="stat.color" x-text="stat.count"></p>
                    <p class="text-xs text-gray-500 mt-1" x-text="stat.label"></p>
                </div>
            </template>
        </div>

        <!-- Filter Bar -->
        <div class="bg-white rounded-lg shadow-sm p-4 mb-6 flex gap-4 items-center border">
            <span class="text-sm font-medium text-gray-700">Filter:</span>
            <select x-model="filterPlatform" @change="filterContent()"
                    class="text-sm border rounded px-2 py-1">
                <option value="">All Platforms</option>
                <option value="linkedin">LinkedIn</option>
                <option value="facebook_tech">Facebook Tech</option>
                <option value="facebook_chinese">Facebook Chinese</option>
            </select>
            <select x-model="filterStatus" @change="filterContent()"
                    class="text-sm border rounded px-2 py-1">
                <option value="">All Status</option>
                <option value="pending_review">Pending Review</option>
                <option value="approved">Approved</option>
                <option value="published">Published</option>
                <option value="rejected">Rejected</option>
            </select>
            <span class="text-sm text-gray-500 ml-auto" x-text="filteredContent.length + ' items'"></span>
        </div>

        <!-- Content Table -->
        <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Platform</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Created</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <template x-for="item in filteredContent" :key="item.id">
                        <tr class="hover:bg-gray-50 cursor-pointer" @click="toggleExpand(item.id)">
                            <td class="px-4 py-3 text-sm font-mono" x-text="'#' + item.id"></td>
                            <td class="px-4 py-3 text-sm font-medium text-gray-900" x-text="item.title"></td>
                            <td class="px-4 py-3">
                                <span class="text-xs px-2 py-1 rounded-full"
                                      :class="platformClass(item.platform)"
                                      x-text="item.platform"></span>
                            </td>
                            <td class="px-4 py-3">
                                <span class="text-xs px-2 py-1 rounded-full"
                                      :class="statusClass(item.status)"
                                      x-text="item.status"></span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-500" x-text="item.created_at"></td>
                            <td class="px-4 py-3">
                                <template x-if="item.status === 'pending_review'">
                                    <div class="flex gap-2">
                                        <button @click.stop="approve(item.id)"
                                                class="text-xs bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600">
                                            ✓ Approve
                                        </button>
                                        <button @click.stop="reject(item.id)"
                                                class="text-xs bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">
                                            ✗ Reject
                                        </button>
                                    </div>
                                </template>
                            </td>
                        </tr>
                    </template>
                    <!-- Expanded content preview -->
                    <template x-for="item in filteredContent" :key="'expand-' + item.id">
                        <tr x-show="expandedId === item.id" x-cloak>
                            <td colspan="6" class="px-4 py-4 bg-gray-50">
                                <div class="max-w-3xl">
                                    <h4 class="font-medium text-gray-700 mb-2">Content Preview:</h4>
                                    <div class="bg-white p-4 rounded border text-sm whitespace-pre-wrap"
                                         x-text="item.generated_content"></div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <script>
    function dashboard() {
        return {
            content: [],
            filteredContent: [],
            stats: [],
            filterPlatform: '',
            filterStatus: '',
            expandedId: null,
            lastUpdated: 'Loading...',

            async init() {
                // In production, these would be n8n webhook API calls
                // For now, show demo data structure
                this.stats = [
                    { label: 'Draft', count: 0, color: 'text-gray-600' },
                    { label: 'Pending', count: 0, color: 'text-yellow-600' },
                    { label: 'Approved', count: 0, color: 'text-blue-600' },
                    { label: 'Scheduled', count: 0, color: 'text-purple-600' },
                    { label: 'Published', count: 0, color: 'text-green-600' },
                    { label: 'Rejected', count: 0, color: 'text-red-600' },
                    { label: 'Total', count: 0, color: 'text-gray-800' }
                ];
                this.lastUpdated = new Date().toLocaleString('vi-VN');

                // TODO: Replace with actual API calls
                // await this.fetchContent();
                // await this.fetchStats();
            },

            async refresh() {
                this.lastUpdated = new Date().toLocaleString('vi-VN');
                // await this.fetchContent();
            },

            filterContent() {
                this.filteredContent = this.content.filter(item => {
                    if (this.filterPlatform && item.platform !== this.filterPlatform) return false;
                    if (this.filterStatus && item.status !== this.filterStatus) return false;
                    return true;
                });
            },

            toggleExpand(id) {
                this.expandedId = this.expandedId === id ? null : id;
            },

            async approve(id) {
                // POST /api/content/{id}/approve
                alert('Approved #' + id + ' (connect to n8n webhook API)');
            },

            async reject(id) {
                const reason = prompt('Ly do tu choi:');
                if (reason) {
                    // POST /api/content/{id}/reject
                    alert('Rejected #' + id + ': ' + reason);
                }
            },

            statusClass(status) {
                const classes = {
                    'draft': 'bg-gray-100 text-gray-700',
                    'pending_review': 'bg-yellow-100 text-yellow-700',
                    'approved': 'bg-blue-100 text-blue-700',
                    'scheduled': 'bg-purple-100 text-purple-700',
                    'published': 'bg-green-100 text-green-700',
                    'rejected': 'bg-red-100 text-red-700'
                };
                return classes[status] || 'bg-gray-100';
            },

            platformClass(platform) {
                const classes = {
                    'linkedin': 'bg-blue-50 text-blue-700',
                    'facebook_tech': 'bg-indigo-50 text-indigo-700',
                    'facebook_chinese': 'bg-orange-50 text-orange-700'
                };
                return classes[platform] || 'bg-gray-100';
            }
        }
    }
    </script>
</body>
</html>
