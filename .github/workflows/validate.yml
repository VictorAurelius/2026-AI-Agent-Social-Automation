name: Validate PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'modules/social/workflows/**'
      - 'infrastructure/docker/init-db/**'
      - 'scripts/**'
      - 'infrastructure/templates/**'
      - '.github/workflows/**'

jobs:
  validate:
    name: Validate Workflows & SQL
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Validate workflow JSON files
        run: bash scripts/test/validate-workflows.sh

      - name: Validate SQL scripts
        run: bash scripts/test/validate-sql.sh

      - name: Run security scan
        run: bash scripts/test/test-security.sh

      - name: Summary
        if: always()
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow JSON | $([[ -f /tmp/wf-pass ]] && echo '✅ Pass' || echo '⚠️ Check logs') |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Scripts | $([[ -f /tmp/sql-pass ]] && echo '✅ Pass' || echo '⚠️ Check logs') |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | $([[ -f /tmp/sec-pass ]] && echo '✅ Pass' || echo '⚠️ Check logs') |" >> $GITHUB_STEP_SUMMARY
